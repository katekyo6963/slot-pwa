<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かぐや 665-688</title>
<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{ margin:20px 0; }

#board{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:8px;
  max-width:900px;
  margin:20px auto;
}

.cell{
  border:2px solid #444;
  border-radius:10px;
  padding:12px 0;
  font-size:18px;
  user-select:none;
}

.cell.active{
  background:#f4c542;
  color:#000;
}

.cell.used{
  background:#555;
  color:#999;
}

.cell.recommend{
  border:3px solid red;
}

.panel{
  background:#111;
  padding:15px;
  margin:20px auto;
  max-width:600px;
  border-radius:12px;
}
button{
  padding:6px 12px;
  border-radius:8px;
  border:none;
}
</style>
</head>
<body>

<h1>かぐや 665-688</h1>

<div>
Day:
<select>
<option>1</option>
</select>
<button onclick="resetBoard()">開催リセット</button>
</div>

<div id="board"></div>

<div class="panel">
🎯 並び候補 赤枠表示中
</div>
<script>
const upper = [665,666,667,668,669,670,671,672,673,674,675,676];
const lower = [688,687,686,685,684,683,682,681,680,679,678,677];

const board = document.getElementById("board");
const panel = document.querySelector(".panel");

// ===== 盤面生成 =====
[...upper, ...lower].forEach(num => {
  const div = document.createElement("div");
  div.className = "cell";
  div.textContent = num;
  div.dataset.lastTap = 0;

  div.onclick = () => {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - div.dataset.lastTap;

    if (tapLength < 400 && tapLength > 0) {
      div.classList.remove("active");
      div.classList.toggle("used");
    } else {
      if (!div.classList.contains("used")) {
        div.classList.toggle("active");
      }
    }

    div.dataset.lastTap = currentTime;
    evaluateBoard();
  };

  board.appendChild(div);
});

// ===== 共通 =====
function getActiveCells(){
  return Array.from(document.querySelectorAll(".cell.active"));
}

function getNum(div){
  return Number(div.textContent);
}

function isHorizontalPair(a, b){
  const aNum = getNum(a);
  const bNum = getNum(b);

  if (upper.includes(aNum) && upper.includes(bNum) && Math.abs(aNum - bNum) === 1) return true;
  if (lower.includes(aNum) && lower.includes(bNum) && Math.abs(aNum - bNum) === 1) return true;

  return false;
}

function clearRecommend(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("recommend");
  });
}

function recommendHorizontalAround(pairNums){
  pairNums.forEach(num=>{
    const left = num - 1;
    const right = num + 1;

    document.querySelectorAll(".cell").forEach(c=>{
      const n = getNum(c);
      if ((n === left || n === right) && !c.classList.contains("active")){
        c.classList.add("recommend");
      }
    });
  });
}

// ===== 評価ロジック =====
function evaluateBoard(){
  const actives = getActiveCells();
  clearRecommend();

  if (actives.length !== 3){
    panel.innerHTML = "🎯 並び候補待機中";
    return;
  }

  for (let i=0;i<actives.length;i++){
    for (let j=i+1;j<actives.length;j++){
      if (isHorizontalPair(actives[i], actives[j])){

        const pairNums = [getNum(actives[i]), getNum(actives[j])];
        recommendHorizontalAround(pairNums);

        panel.innerHTML = "🟢 2×2濃厚モード";
        return;
      }
    }
  }

  panel.innerHTML = "🟡 3＋1濃厚モード";
}

// ===== リセット =====
function resetBoard(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("active","used","recommend");
    c.dataset.lastTap = 0;
  });
  panel.innerHTML = "🎯 並び候補待機中";
}
</script>
</body>
</html>
