<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かぐや 665-688</title>
<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}

h1{ margin:20px 0; }

#board{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:8px;
  max-width:900px;
  margin:20px auto;
}

.cell{
  border:2px solid #444;
  border-radius:10px;
  padding:12px 0;
  font-size:18px;
  user-select:none;
}

.cell.active{
  background:#f4c542;
  color:#000;
}

.cell.used{
  background:#555;
  color:#999;
}

.cell.recommend{
  border:3px solid red;
}

.panel{
  background:#111;
  padding:15px;
  margin:20px auto;
  max-width:600px;
  border-radius:12px;
}
button{
  padding:6px 12px;
  border-radius:8px;
  border:none;
}
</style>
</head>
<body>

<h1>かぐや24台ローテ攻略ロジック（4台パッケージ理論）

</h1>

<div>
Day:
<select>
<option>1</option>
</select>
<button onclick="resetBoard()">当日リセット</button>
</div>

<div id="board"></div>

<div class="panel">
🎯 並び候補 赤枠表示中
</div>
<script>
const upper = [665,666,667,668,669,670,671,672,673,674,675,676];
const lower = [688,687,686,685,684,683,682,681,680,679,678,677];

const board = document.getElementById("board");

// ===== 盤面生成 =====
[...upper, ...lower].forEach(num => {
  const div = document.createElement("div");
  div.className = "cell";
  div.textContent = num;

  // 台ごとの最終タップ時間
  div.dataset.lastTap = 0;

  div.onclick = () => {
    const now = Date.now();
    const diff = now - Number(div.dataset.lastTap);

    // ダブルタップ（400ms以内）
    if (diff < 400 && diff > 0) {
      div.classList.remove("active");
      div.classList.toggle("used");
    } else {
      if (!div.classList.contains("used")) {
        div.classList.toggle("active");
      }
    }

    div.dataset.lastTap = now;
    evaluateBoard();
  };

  board.appendChild(div);
});

// ===== 評価ロジック =====
function evaluateBoard() {
  // まず赤枠リセット
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("recommend");
  });

  const activeCells = Array.from(document.querySelectorAll(".cell.active"));
  const activeNums = activeCells.map(c => parseInt(c.textContent));

  if (activeNums.length === 0) return;

  const sorted = activeNums.slice().sort((a,b)=>a-b);

  // ===== ① 2×2優先モード =====
  if (sorted.length === 3) {
    let hasPair = false;

    for (let i=0; i<sorted.length-1; i++){
      if (sorted[i+1] === sorted[i] + 1){
        hasPair = true;
      }
    }

    if (hasPair) {
      const singles = sorted.filter(n=>{
        return !sorted.includes(n-1) && !sorted.includes(n+1);
      });

      if (singles.length === 1) {
        const single = singles[0];

        [single-1, single+1].forEach(n=>{
          const target = findCell(n);
          if (target && !target.classList.contains("active")) {
            target.classList.add("recommend");
          }
        });

        return; // 2×2優先なのでここで終了
      }
    }
  }

  // ===== ② 通常並び候補表示 =====
  sorted.forEach(n=>{
    [n-1, n+1].forEach(candidate=>{
      const cell = findCell(candidate);
      if (cell && !cell.classList.contains("active")){
        cell.classList.add("recommend");
      }
    });
  });
}

// ===== 補助関数 =====
function findCell(num){
  return Array.from(document.querySelectorAll(".cell"))
    .find(c=>parseInt(c.textContent)===num);
}

// ===== リセット =====
function resetBoard(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("active","used","recommend");
    c.dataset.lastTap = 0;
  });
}
</script>
</body>
</html>
